  <!-- Favicon: same CJR mark as homepage -->

  <!-- IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --bg: #faf9f6;
      --ink: #111111;
      --ink-muted: #555555;
      --rule: #d8d6d0;
      --column: 680px;
      --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      padding: 72px 32px 120px;
      max-width: var(--column);
      margin: 0 auto;
    }

    /* Top nav — minimal return link */
    .nav {
      margin-bottom: 56px;
      font-size: 14px;
      color: var(--ink-muted);
    }

    .nav a {
      color: var(--ink-muted);
      text-decoration: none;
    }

    .nav a:hover {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    /* Page header */
    header {
      margin-bottom: 56px;
    }

    h1 {
      font-size: 15px;
      font-weight: 500;
      margin: 0 0 24px;
    }

    h1::before {
      content: "§ ";
      color: var(--ink-muted);
    }

    .intro {
      margin: 0;
      color: var(--ink-muted);
    }

    /* Essay list */
    .essays {
      margin-top: 48px;
    }

    .essay-entry {
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
    }

    .essay-date {
      color: var(--ink-muted);
      font-size: 13px;
      padding-top: 2px;
    }

    .essay-title-link {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: text-decoration-thickness 120ms ease;
    }

    .essay-title-link:hover {
      text-decoration-thickness: 2px;
    }

    .essay-description {
      color: var(--ink-muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* Empty state */
    .empty-state {
      color: var(--ink-muted);
      font-style: normal;
      margin-top: 48px;
    }

    /* Footer */
    footer {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      color: var(--ink-muted);
      font-size: 13px;
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        padding: 48px 24px 80px;
        font-size: 14px;
      }
      h1 { font-size: 14px; }
      .essay-entry {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .essay-date {
        font-size: 12px;
      }
    }

    ::selection {
      background: var(--ink);
      color: var(--bg);
    }
  </style>
</head>
<body>

  <div class="nav">
    <a href="/">← Charles J Read</a>
  </div>

  <header>
    <h1>Writing</h1>
    <p class="intro">
      Notes on investing, operating, and the markets I spend time in.
    </p>
  </header>

  <div class="essays">

      Essay entries go here. Format:

      <div class="essay-entry">
        <div class="essay-date">April 2026</div>
        <div>

          <div class="essay-description">One-line description of the essay.</div>
        </div>
      </div>
    -->

    <p class="empty-state">No essays yet.</p>
  </div>

  <footer>
    © Charles J Read
  </footer>

</body>
</html>
